# LLM 서버 (MVP 2+)
# 실행:
#   docker compose -f docker-compose.mvp0.yml -f docker-compose.llm.yml --env-file .env.paper up -d

version: "3.9"

services:

  # ============================
  # GPU 그룹: vLLM OpenAI-compatible LLM
  # ============================
  llm-server:
    # v0.10.0 = CUDA 12.8 빌드. latest(CUDA 13)는 드라이버 535(CUDA 12.2)와 메이저 불일치라 불가.
    image: vllm/vllm-openai:v0.10.0
    restart: unless-stopped
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      VLLM_GPU_MEMORY_UTILIZATION: "0.85"
      HF_HOME: /models/huggingface
      # 드라이버 535에서 minor-버전 호환으로 구동 (런타임 cuda>=12.8 게이트 우회)
      NVIDIA_DISABLE_REQUIRE: "1"
    volumes:
      - ./models:/models
    ports:
      - "127.0.0.1:8000:8000"
    networks: [trading_net]
    # forward-compat 라이브러리 제거 → 호스트 드라이버(535) libcuda로 fallback 후 vLLM 기동
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        rm -rf /usr/local/cuda/compat && ldconfig 2>/dev/null;
        exec python3 -m vllm.entrypoints.openai.api_server
        --host 0.0.0.0 --port 8000
        --model /models/Qwen3-30B-A3B-Instruct-2507-AWQ
        --served-model-name Qwen3-30B-A3B-Instruct-2507
        --gpu-memory-utilization 0.92
        --max-model-len 16384
        --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=0
              capabilities: [gpu]
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ============================
  # GPU 그룹: 임베딩 서버 (bge-m3)
  # ============================
  embedding-server:
    build:
      context: .
      dockerfile: infra/embedding/Dockerfile
    restart: unless-stopped
    environment:
      MODEL_PATH: /models/bge-m3
    volumes:
      - ./models/bge-m3:/models/bge-m3:ro
    ports:
      - "127.0.0.1:8001:8001"
    networks: [trading_net]
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=0
              capabilities: [gpu]
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

networks:
  trading_net:
    external: true
    name: trading_paper_net

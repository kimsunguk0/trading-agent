strategy_id: us_earnings_reaction_v1
version: 1
market: US
description: 'Earnings surprise reaction strategy - follow gap direction after earnings'
universe:
  market_cap_usd:
    min: 1_000_000_000
  exclude: [trading_halt, extended_hours_only]
  liquidity:
    min_avg_volume_20d: 1_000_000
regime_filter:
  enabled_regimes: [bull_trend, bull_volatile]
  disabled_regimes: [bear_trend, panic]
entry:
  all_of:
    - earnings.surprise_pct >= 5.0
    - earnings.revenue_surprise_pct >= 2.0
    - price.gap_pct >= 3.0
    - volume.first_30min_vs_avg >= 3.0
    - price.holds_gap_after_30min == true
exit:
  stop_loss_pct: 0.030
  take_profit:
    - { pct: 0.05, qty_ratio: 0.5 }
    - { pct: 0.10, qty_ratio: 0.5 }
  time_stop_minutes: 120
risk:
  max_position_pct_nav: 0.015
  max_daily_trades: 3
  max_strategy_daily_loss_pct_nav: 0.01
  max_concurrent_positions: 2
execution:
  order_type: limit
  limit_price_basis: best_ask
  max_slippage_pct: 0.004
  allow_market_order: false
approval:
  mode: LIVE_APPROVAL
